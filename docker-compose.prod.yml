version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vintagenshitt-backend-prod
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
        - NEXT_PUBLIC_MIDTRANS_CLIENT_KEY=${NEXT_PUBLIC_MIDTRANS_CLIENT_KEY:-Mid-client-ZYwMsynAQnq9JtJg}
    container_name: vintagenshitt-frontend-prod
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
